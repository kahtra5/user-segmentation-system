# Docker Compose configuration
version: "3.9"

services:
  api:
    build: .
    container_name: segmentation_api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    env_file:
      - .env

  postgres:
    image: postgres:15
    container_name: segmentation_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: segmentation
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: segmentation_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: segmentation_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"